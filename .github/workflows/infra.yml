# .github/workflows/infra.yml
name: Infrastructure

on:
  push:
    branches: [main]
    paths: ['infra/**']
  pull_request:
    paths: ['infra/**']

permissions:
  id-token: write       # OIDC
  contents: read
  pull-requests: write  # post plan as comment

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.14.0"
  TF_VAR_alarm_email: ${{ secrets.ALARM_EMAIL }}
  TF_VAR_github_access_token: ${{ secrets.AMPLIFY_GITHUB_TOKEN }}
  TF_VAR_github_owner: gpazevedo
  TF_VAR_github_org: gpazevedo
  TF_VAR_github_repo: stanford
  TF_VAR_create_oidc_provider: "false"

jobs:
  plan:
    name: Terraform Plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: bash init.sh

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color 2>&1 | tee /tmp/plan_output.txt
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/plan_output.txt', 'utf8');
            const MAX = 60000;
            const body = plan.length > MAX
              ? plan.substring(0, MAX) + '\n...(truncated — see Actions log for full output)'
              : plan;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${body}\n\`\`\``
            });

      - name: Fail job if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Terraform Apply
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: bash init.sh

      - name: Terraform Apply
        run: terraform apply -auto-approve
